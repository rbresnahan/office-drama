<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Blackout Memory</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="app shell">
		<header class="panel hero">
			<p id="app-eyebrow" class="eyebrow">Truth degrades when you do not secure it.</p>
			<h1 id="app-title">Blackout Memory</h1>
			<p id="app-subtitle" class="hero-copy">
				A stormed-out town, a hit-and-run on the road in, and a mind that does not hold details for long.
			</p>
		</header>

		<section class="layout">
			<section class="panel main-panel">
				<div id="story" class="story-panel"></div>
				<div id="choices" class="choices-panel"></div>
			</section>

			<aside class="sidebar">
				<section class="panel sidebar-panel">
					<h3>Status</h3>
					<div id="stats"></div>
				</section>

				<section class="panel sidebar-panel">
					<h3>Evidence</h3>
					<div id="inventory"></div>
				</section>

				<section class="panel sidebar-panel">
					<h3>Beliefs</h3>
					<div id="flags"></div>
				</section>

				<section class="panel sidebar-panel">
					<h3>Recent Drift</h3>
					<div id="feedback"></div>
				</section>

				<section class="panel sidebar-panel sidebar-panel--memories">
					<h3>Memory</h3>
					<div id="log"></div>
				</section>
			</aside>
		</section>
	</main>

	<script type="module" src="main.js"></script>
</body>
</html>
