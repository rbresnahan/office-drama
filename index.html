<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Office Panic</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<main id="app" class="app-shell">
		<header class="game-header">
			<div>
				<p class="eyebrow">Office Panic Demo</p>
				<h1>Choose Your Damage</h1>
			</div>

			<div class="header-actions">
				<div class="turn-pill">
					<span id="phase-label">Damage Control</span>
					<strong id="turn-count">Turn 1 / 12</strong>
				</div>

				<button id="restart-game" class="ghost-button" type="button">
					Restart
				</button>
			</div>
		</header>

		<section class="game-grid">
			<aside class="panel status-panel" aria-label="Game status">
				<div id="latest-signal" class="signal-strip">
					<span class="signal-strip__label">Latest</span>
					<span class="signal-strip__text">The bad email is loose. The all-hands is coming.</span>
				</div>

				<div class="bars-section">
					<h2>Stories You Are Building</h2>
					<div id="green-bars" class="bars-list"></div>
				</div>

				<div class="bars-section">
					<h2>Threats Closing In</h2>
					<div id="red-bars" class="bars-list"></div>
				</div>
			</aside>

			<section class="panel main-panel">
				<article id="story" class="story-panel" aria-live="polite"></article>

				<div id="action-feedback" class="reaction-card reaction-card--hidden" aria-live="polite"></div>

				<div id="choices" class="choices-panel" aria-label="Choices"></div>
			</section>
		</section>
	</main>

	<script type="module" src="./main.js"></script>
</body>
</html>
