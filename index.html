<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Choose Your Own Adventure</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="game">
		<h1 class="game__title">Choose Your Own Adventure</h1>

		<section class="card state-card">
			<h2 class="panel-title">Status</h2>
			<div id="stats"></div>
			<div id="inventory"></div>
			<div id="flags"></div>
		</section>

		<section class="card feedback-card">
			<h2 class="panel-title">Latest Event</h2>
			<div id="feedback" class="feedback-empty">Nothing yet.</div>
		</section>

		<section class="card log-card">
			<h2 class="panel-title">Event Log</h2>
			<div id="log" class="log-empty">No events recorded yet.</div>
		</section>

		<section class="card">
			<div id="story">Booting...</div>
			<div id="choices" class="choices"></div>
		</section>
	</main>

	<script type="module" src="assets/js/app.js"></script>
</body>
</html>
