<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Reply All</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="app shell">
		<header class="panel hero">
			<p id="app-eyebrow" class="eyebrow">Delay discovery. Shape the room. Survive the reveal.</p>
			<h1 id="app-title">Reply All</h1>
			<p id="app-subtitle" class="hero-copy">
				You sent a bad email about one coworker. Recall only partly worked. Keep them from finding out too early—and if they do, survive the fallout.
			</p>
		</header>

		<section class="layout">
			<section class="panel main-panel">
				<div id="latest-signal" class="signal-strip"></div>
				<div id="story" class="story-panel"></div>
				<div id="choices" class="choices-panel"></div>
			</section>

			<aside class="sidebar">
				<section class="panel sidebar-panel sidebar-panel--wide sidebar-panel--status">
					<div id="status-panel" class="status-strip"></div>
				</section>

				<section class="panel sidebar-panel sidebar-panel--wide">
					<h3 id="section-a-title">Run Overview</h3>
					<div id="section-a-panel" class="panel-body"></div>
				</section>

				<section class="panel sidebar-panel sidebar-panel--wide">
					<h3 id="section-b-title">Office Floor</h3>
					<div id="section-b-panel" class="panel-body"></div>
				</section>

				<section class="panel sidebar-panel sidebar-panel--wide">
					<h3 id="section-c-title">Read on People</h3>
					<div id="section-c-panel" class="panel-body"></div>
				</section>

				<section class="panel sidebar-panel sidebar-panel--wide">
					<h3 id="section-d-title">Memory & Evidence</h3>
					<div id="section-d-panel" class="panel-body"></div>
				</section>
			</aside>
		</section>
	</main>

	<script type="module" src="main.js"></script>
</body>
</html>
