<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Office Panic</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<main id="app" class="app-shell">
		<header class="game-header">
			<button class="icon-button" type="button" aria-label="Open menu">
				<span class="icon-button__lines" aria-hidden="true"></span>
			</button>

			<div class="game-header__title">
				<p class="eyebrow">Office Panic Demo</p>
				<h1>Damage Control</h1>
			</div>

			<button class="icon-button" type="button" aria-label="Game information">
				<span class="icon-button__info" aria-hidden="true">i</span>
			</button>
		</header>

		<section class="office-time-bar" aria-label="Current office time">
			<span id="clock-label" class="clock-pill__label">Start</span>

			<div id="office-time-track" class="time-track" aria-hidden="true">
				<span class="time-track__dot"></span>
				<span class="time-track__dot"></span>
				<span class="time-track__dot"></span>
				<span class="time-track__dot"></span>
				<span class="time-track__dot"></span>
				<span class="time-track__dot"></span>
				<span class="time-track__dot"></span>
				<span class="time-track__marker"></span>
			</div>

			<button id="schedule-label" class="schedule-label" type="button" aria-haspopup="dialog">Next: Stand Up</button>

			<strong id="turn-count" class="clock-pill__time">9:00 AM</strong>
		</section>

		<section class="game-board" aria-label="Game board">
			<nav id="intel-tabs" class="intel-tabs" aria-label="Intel panel tabs" role="tablist"></nav>

			<article id="intel-panel" class="intel-panel" aria-live="polite"></article>

			<section class="choices-section" aria-label="Choices">
				<h2 class="choices-section__heading">Choose Your Next Move</h2>
				<div id="choices" class="choices-panel"></div>
			</section>
		</section>

		<section class="status-summary" aria-label="Game status">
			<div id="plans-summary" class="status-summary__cell"></div>
			<div id="watching-summary" class="status-summary__cell"></div>
			<div id="heat-summary" class="status-summary__cell"></div>
		</section>

		<button id="restart-game" class="restart-button" type="button">
			↻ Restart Demo
		</button>
	</main>

	<script type="module" src="./main.js"></script>
</body>
</html>
