<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Office Panic</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<main id="app" class="app-shell">
		<header class="game-header">
			<div>
				<p class="eyebrow">Office Panic Demo</p>
				<h1>Damage Control</h1>
			</div>
		</header>

		<aside class="panel status-panel" aria-label="Game controls">
			<div class="clock-pill" aria-label="Current office time">
				<span id="clock-label" class="clock-pill__label">Start</span>
				<strong id="turn-count">9:00 AM</strong>
			</div>

			<button id="restart-game" class="ghost-button" type="button">
				Restart
			</button>
		</aside>

		<section class="panel main-panel">
			<article id="story" class="story-panel" aria-live="polite"></article>

			<details id="latest-signal" class="signal-strip" open>
				<summary class="signal-strip__summary">
					<span class="signal-strip__label">Chatter</span>
				</summary>

				<span class="signal-strip__text">It's too Late, cause a disruption.</span>
			</details>

			<div id="internal-thought" class="internal-thought-card internal-thought-card--hidden" aria-live="polite"></div>

			<div id="action-feedback" class="reaction-card reaction-card--hidden" aria-live="polite"></div>

			<div id="choices" class="choices-panel" aria-label="Choices"></div>

			<section class="status-bars-panel" aria-label="Game status">
				<div class="bars-grid">
					<div class="bars-section">
						<h2>Plans and Alliances</h2>
						<div id="green-bars" class="bars-list"></div>
					</div>

					<div class="bars-section">
						<h2>Watching You</h2>
						<div id="red-bars" class="bars-list"></div>
					</div>
				</div>
			</section>
		</section>
	</main>

	<script type="module" src="./main.js"></script>
</body>
</html>
